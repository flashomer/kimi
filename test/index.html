<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Page Site</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        .slider {
            width: 100%;
            overflow: hidden;
        }
        .slider img {
            width: 100%;
            display: none;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }
        .gallery img {
            width: calc(33.333% - 10px);
            height: auto;
            object-fit: cover;
        }
        .contact {
            background: #f4f4f4;
            padding: 20px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .gallery img {
                width: calc(50% - 10px);
            }
        }
        @media (max-width: 480px) {
            .gallery img {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Site Başlığı</h1>
    </header>
    <div class="slider">
        <img src="slide1.jpg" alt="Slider Image 1">
        <img src="slide2.jpg" alt="Slider Image 2">
        <!-- More slides -->
    </div>
    <div class="gallery">
        <img src="gallery1.jpg" alt="Gallery Image 1">
        <img src="gallery2.jpg" alt="Gallery Image 2">
        <!-- More gallery images -->
    </div>
    <div class="contact">
        <h2>İletişim</h2>
        <p>Email: contact@example.com</p>
        <p>Telefon: 0123 456 789</p>
    </div>
    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slider img');
        setInterval(() => {
            slides[currentSlide].style.display = 'none';
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].style.display = 'block';
        }, 3000);
    </script>
</body>
</html>
